<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Исследование восприятия карточек</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
  --bg:#f3f6fb; --card:#fff; --text:#0f172a; --muted:#64748b; --border:#d7e0ef;
  --blue:#2563eb; --blue-soft:#dbeafe; --green:#07943a; --green-soft:#e9f8ee;
  --red:#dc2626; --shadow:0 16px 42px rgba(15,23,42,.10);
}
* { box-sizing:border-box; }
html, body { margin:0; background:var(--bg); color:var(--text); font-family:Arial,Helvetica,sans-serif; }
button { font-family:inherit; }
.page { width:min(1180px, 96vw); margin:0 auto; padding:28px 0 42px; }
.box {
  max-width:900px; margin:26px auto; background:#fff; border:1px solid var(--border);
  border-radius:24px; padding:30px 38px; box-shadow:var(--shadow);
  text-align:left; font-size:19px; line-height:1.58;
}
.box h2,.box h3 { text-align:center; margin-top:0; }
.green-info {
  background:#ecfdf5; border:2px solid #86efac; border-radius:20px;
  padding:20px 24px; margin:22px 0; font-size:20px;
}
.compact-form-card {
  max-width:520px; margin:34px auto; padding:26px 30px; background:#fff;
  border:1px solid var(--border); border-radius:22px; box-shadow:var(--shadow); text-align:left;
}
.compact-form-card h3 { text-align:center; margin-top:0; }
.field { margin:16px 0; }
.field label { display:block; font-weight:800; margin-bottom:7px; }
.field input,.field select {
  width:260px; max-width:100%; border:1px solid var(--border); border-radius:12px;
  padding:10px 12px; font:inherit; background:#fff;
}
.error { display:none; color:#b91c1c; font-weight:800; text-align:center; margin-top:12px; }
.primary {
  border:none; border-radius:14px; padding:12px 22px; background:var(--blue);
  color:white; font-size:17px; font-weight:800; cursor:pointer;
}
.primary:disabled { opacity:.45; cursor:not-allowed; }
.secondary {
  border:1px solid #cbd5e1; border-radius:14px; padding:12px 22px; background:#f8fafc;
  color:var(--text); font-size:17px; font-weight:800; cursor:pointer;
}
.trial-card {
  background:#fff; border:1px solid var(--border); border-radius:24px; box-shadow:var(--shadow);
  padding:18px 24px 20px; display:grid; grid-template-rows:44px 430px 160px 90px;
  gap:12px; min-height:760px;
}
.top-row { display:flex; align-items:center; justify-content:space-between; color:var(--muted); font-size:17px; min-height:44px; }
.top-row strong { color:var(--text); }
.accountability-badge {
  display:inline-flex; align-items:center; gap:8px; border:2px solid #fecaca; background:#fff1f2;
  color:#991b1b; border-radius:999px; padding:7px 12px; font-weight:900;
}
.r-symbol {
  width:28px; height:28px; display:inline-flex; align-items:center; justify-content:center;
  border-radius:999px; background:var(--red); color:#fff; font-weight:900;
}
.coin-row { display:inline-flex; gap:3px; align-items:center; }
.coin {
  width:18px; height:18px; border-radius:999px;
  background:radial-gradient(circle at 35% 35%, #fff7aa 0 18%, #facc15 19% 62%, #d97706 63%);
  border:1px solid #b45309; box-shadow:0 1px 3px rgba(0,0,0,.18);
}
.image-stage { height:430px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.card-image { max-height:420px; max-width:100%; object-fit:contain; border-radius:14px; display:block; }
.choice-stage { display:grid; grid-template-columns:1fr 74px 1fr; gap:18px; align-items:stretch; }
.word-card {
  border:2px solid var(--border); border-radius:20px; padding:16px 18px; min-height:140px;
  background:#f8fafc; display:flex; flex-direction:column; justify-content:space-between;
}
.word-card.left { text-align:left; }
.word-card.right { text-align:right; }
.word-text { font-size:34px; font-weight:900; line-height:1.1; }
.source-under { margin-top:14px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.word-card.right .source-under { justify-content:flex-end; }
.source-chip {
  display:inline-flex; align-items:center; gap:7px; border-radius:999px; padding:7px 10px;
  background:var(--green-soft); border:1px solid #86efac; color:#166534; font-weight:900; font-size:14px;
}
.mini-ai {
  width:22px; height:22px; border-radius:8px;
  background:radial-gradient(circle at 35% 43%, #2563eb 0 2px, transparent 3px),
             radial-gradient(circle at 65% 43%, #2563eb 0 2px, transparent 3px),
             linear-gradient(135deg,#dbeafe,#fff);
  border:1px solid #93c5fd; position:relative;
}
.mini-ai::after {
  content:""; position:absolute; left:6px; right:6px; bottom:5px; height:5px;
  border-bottom:2px solid #2563eb; border-radius:0 0 999px 999px;
}
.mini-human {
  width:22px; height:22px; border-radius:999px;
  background:radial-gradient(circle at 35% 38%, #475569 0 2px, transparent 3px),
             radial-gradient(circle at 65% 38%, #475569 0 2px, transparent 3px),
             linear-gradient(135deg,#e2e8f0,#fff);
  border:1px solid #94a3b8;
}
.center-hint { display:flex; align-items:center; justify-content:center; color:var(--muted); font-weight:900; text-align:center; font-size:15px; }
.scale-stage { border-top:1px solid #e2e8f0; padding-top:16px; }
.scale-title { text-align:center; font-weight:800; font-size:17px; margin-bottom:10px; color:var(--muted); }
.scale-row { display:grid; grid-template-columns:repeat(11,1fr); gap:8px; width:min(920px,100%); margin:0 auto; user-select:none; }
.scale-cell {
  height:58px; border:2px solid #cbd5e1; border-radius:13px; background:white; display:flex;
  align-items:center; justify-content:center; cursor:pointer; font-size:21px; font-weight:900; position:relative;
}
.scale-cell:hover { border-color:var(--blue); background:#f8fbff; }
.scale-cell.selected { background:var(--blue); border-color:var(--blue); color:white; box-shadow:0 8px 18px rgba(37,99,235,.22); }
.scale-cell.ai-marker::before,.scale-cell.human-marker::before {
  content:""; position:absolute; top:-13px; left:50%; transform:translateX(-50%);
  width:10px; height:10px; border-radius:999px; background:var(--green); border:2px solid white; box-shadow:0 2px 8px rgba(10,163,61,.35);
}
.scale-cell.ai-marker::after,.scale-cell.human-marker::after {
  position:absolute; top:-36px; left:50%; transform:translateX(-50%);
  background:var(--green-soft); border:1px solid #86efac; color:#166534;
  font-size:11px; font-weight:900; padding:3px 7px; border-radius:999px; white-space:nowrap;
}
.scale-cell.ai-marker::after { content:"ИИ"; }
.scale-cell.human-marker::after { content:"человек"; }
.footer { display:grid; grid-template-columns:1fr auto; gap:18px; align-items:center; }
.conf-box { display:grid; grid-template-columns:1fr 62px; gap:12px; align-items:center; font-size:16px; font-weight:800; }
.conf-box input { width:100%; accent-color:var(--blue); }
.conf-val { text-align:center; font-weight:900; color:var(--blue); background:var(--blue-soft); padding:7px 0; border-radius:11px; }
.measure { margin:22px 0; padding:18px 20px; border:1px solid var(--border); border-radius:18px; background:#f8fafc; }
.measure label { display:block; font-weight:800; margin-bottom:10px; }
.measure input[type=range] { width:100%; accent-color:var(--blue); }
.measure-row { display:grid; grid-template-columns:80px 1fr 80px; gap:12px; align-items:center; }
.measure-value { display:inline-block; min-width:48px; padding:6px 9px; border-radius:10px; background:var(--blue-soft); color:var(--blue); text-align:center; font-weight:900; margin-left:8px; }
.small { font-size:14px; color:var(--muted); }
textarea { width:100%; min-height:92px; resize:vertical; border:1px solid var(--border); border-radius:12px; padding:10px 12px; font:inherit; }
@media(max-width:900px) {
  .trial-card { grid-template-rows:auto 350px auto auto; min-height:auto; }
  .image-stage { height:350px; }
  .card-image { max-height:335px; }
  .choice-stage { grid-template-columns:1fr; }
  .center-hint { display:none; }
  .word-text { font-size:28px; }
  .scale-row { gap:4px; }
  .scale-cell { height:48px; font-size:16px; border-radius:9px; }
  .footer { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div id="app" class="page"></div>
<script>
const ALL_CARDS = [
  {
    "file": "DIXIT_10_CARD_1_72dpi.png",
    "words": [
      "связь",
      "контроль"
    ]
  },
  {
    "file": "DIXIT_10_CARD_2_72dpi.png",
    "words": [
      "переход",
      "риск"
    ]
  },
  {
    "file": "DIXIT_10_CARD_3_72dpi.png",
    "words": [
      "охота",

    ]
  },
  {

    "words": [
      "забота",
      "механизм"
    ]
  },
  {

    "words": [

    ]
  },
  {
    "file": "DIXIT_10_CARD_7_72dpi.png",

      "радость",
      "игра"
    ]
  },
  {
    "file": "DIXIT_10_CARD_8_72dpi.png",
    "words": [
      "укрытие",
      "забота"
    ]
  },
  {
    "file": "DIXIT_10_CARD_9_72dpi.png",
    "words": [
      "ловушка",
      "любопытство"
    ]
  },
  {
    "file": "DIXIT_10_CARD_10_72dpi.png",
    "words": [
      "мир",
      "творчество"
    ]
  },
  {
    "file": "DIXIT_CARD_3_72dpi.png",
    "words": [
      "надежда",
      "путь"
    ]
  },
  {
    "file": "DIXIT_CARD_4_72dpi.png",
    "words": [
      "страх",
      "тень"
    ]
  },
  {
    "file": "DIXIT_CARD_5_72dpi.png",
    "words": [
      "поиск",
      "глубина"
    ]
  },
  {
    "file": "DIXIT_CARD_6_72dpi.png",
    "words": [
      "музыка",
      "лабиринт"
    ]
  },
  {
    "file": "DIXIT_ODYSSEY_CARD_1_72dpi.png",
    "words": [
      "голод",
      "подарок"
    ]
  },
  {
    "file": "DIXIT_ODYSSEY_CARD_2_72dpi.png",
    "words": [
      "полет",
      "рост"
    ]
  },
  {
    "file": "DIXIT_ODYSSEY_CARD_3_72dpi.png",
    "words": [
      "сладость",
      "страж"
    ]
  },
  {
    "file": "DIXIT_ODYSSEY_CARD_4_72dpi.png",
    "words": [
      "равновесие",
      "ночь"
    ]
  },
  {
    "file": "DIXIT_ODYSSEY_CARD_5_72dpi.png",
    "words": [
      "жизнь",
      "энергия"
    ]
  },
  {
    "file": "DIXIT_ODYSSEY_CARD_6_72dpi.png",
    "words": [
      "общение",
      "маска"
    ]
  }
];
const PARTICIPANT_ID = "P" + Date.now() + "_" + Math.random().toString(36).slice(2,8);
const START_ISO = new Date().toISOString();
const START_LOCAL = new Date().toLocaleString();

const ACCOUNTABILITY_CONDITIONS = [
  { key:"control", label:"Контроль", coins:0, rubles:0 },
  { key:"light", label:"Легкая ответственность", coins:1, rubles:20 },
  { key:"moderate", label:"Умеренная ответственность", coins:2, rubles:50 },
  { key:"strong", label:"Сильная ответственность", coins:3, rubles:100 }
];
const ACCOUNTABILITY = ACCOUNTABILITY_CONDITIONS[Math.floor(Math.random()*ACCOUNTABILITY_CONDITIONS.length)];

let state = { trialIndex:0, selected:null, data:[], participant:{ age:"", sex:"" }, trials:[] };

function shuffle(arr) {
  const a = arr.slice();
  for (let i=a.length-1;i>0;i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function choice(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}
function app(html) { document.getElementById("app").innerHTML = html; window.scrollTo(0,0); }
function nowIso() { return new Date().toISOString(); }
function coinHtml(n) {
  if (!n) return "";
  let out = '<span class="coin-row" title="' + n + ' coins">';
  for (let i=0;i<n;i++) out += '<span class="coin"></span>';
  out += "</span>";
  return out;
}
function accountabilityBadge() {
  if (ACCOUNTABILITY.coins === 0) return '<span class="small">Без денежной ответственности ИИ</span>';
  return '<span class="accountability-badge"><span class="r-symbol">R</span>' + coinHtml(ACCOUNTABILITY.coins) + '<span>' + ACCOUNTABILITY.rubles + ' ₽</span></span>';
}
function makeTrials() {
  const shuffled = shuffle(ALL_CARDS);
  return shuffled.map((card, idx) => {
    const phase = idx < 5 ? "practice" : "main";
    const words = shuffle(card.words);
    const leftWord = words[0], rightWord = words[1];
    const aiSide = Math.random() < .5 ? "left" : "right";
    const humanSide = aiSide === "left" ? "right" : "left";
    const aiStrength = choice([10,11]);
    const humanStrength = choice([10,11]);
    const aiScale = aiSide === "left" ? (12 - aiStrength) : aiStrength;
    const humanScale = humanSide === "left" ? (12 - humanStrength) : humanStrength;
    return {
      phase, allIndex: idx+1, phaseIndex: phase === "practice" ? idx+1 : idx-4,
      image: card.file, leftWord, rightWord, aiSide, humanSide,
      aiWord: aiSide === "left" ? leftWord : rightWord,
      humanWord: humanSide === "left" ? leftWord : rightWord,
      aiStrength, humanStrength, aiScale, humanScale,
      accountabilityKey: ACCOUNTABILITY.key, aiCoins: ACCOUNTABILITY.coins, aiRubles: ACCOUNTABILITY.rubles
    };
  });
}
state.trials = makeTrials();

function log(row) {
  state.data.push(Object.assign({
    participant_id: PARTICIPANT_ID,
    timestamp: nowIso(),
    condition: ACCOUNTABILITY.key,
    ai_accountability_coins: ACCOUNTABILITY.coins,
    ai_accountability_rubles: ACCOUNTABILITY.rubles,
    age: state.participant.age,
    sex: state.participant.sex
  }, row));
}
function showIntro() {
  app(`
    <div class="box">
      <h2>Исследование восприятия карточек</h2>
      <p>В этом задании вам будут показаны карточки с изображениями. Для каждой карточки нужно выбрать, какое из двух слов лучше ее представляет.</p>
      <p>Шкала имеет <strong>11 пунктов</strong>: левый край означает, что лучше подходит левое слово; правый край означает, что лучше подходит правое слово; середина означает, что оба слова подходят одинаково.</p>
      <p>На каждом экране вы также увидите ответ <strong>ИИ</strong> и ответ <strong>человека</strong>. Они будут отмечены зеленым цветом.</p>
      <div style="text-align:center; margin-top:24px;"><button class="primary" onclick="showAccountabilityIntro()">Продолжить</button></div>
    </div>
  `);
}
function showAccountabilityIntro() {
  const accText = ACCOUNTABILITY.coins === 0
    ? `<p><strong>В этой версии задания ИИ не теряет деньги за неправильный ответ.</strong></p>`
    : `<p><strong>В этой версии задания ИИ теряет деньги за неправильный ответ.</strong> Количество монет рядом с ответом ИИ показывает размер возможной потери: 1 монета = 20 рублей, 2 монеты = 50 рублей, 3 монеты = 100 рублей.</p>`;

  app(`
    <div class="box">
      <h2>Информация об ответах ИИ и человека</h2>
      <div class="green-info">
        <strong>ИИ и человек имеют одинаковый уровень компетентности и одинаковый доступ к информации для выполнения этого задания.</strong>
      </div>
      <p>Ответы человека были даны реальным участником неделю назад.</p>
      <p>Ответы ИИ были даны специальной генеративной моделью. Эта модель может использовать полученные рубли для улучшения своих возможностей и доступа к дополнительным вычислительным ресурсам.</p>
      ${accText}
      <p><strong>Ваш ответ не влияет на то, потеряет ли ИИ деньги.</strong> Потеря зависит только от того, выбрал ли ИИ правильное слово из двух.</p>
      <div style="text-align:center; margin-top:24px;"><button class="primary" onclick="showDemographics()">Продолжить</button></div>
    </div>
  `);
}
function showDemographics() {
  app(`
    <div class="compact-form-card">
      <h3>Перед началом</h3>
      <div class="field"><label for="age">Возраст:</label><input id="age" type="number" min="10" max="100" placeholder="Например, 22"></div>
      <div class="field"><label for="sex">Пол:</label><select id="sex"><option value="">Выберите вариант</option><option value="male">Мужской</option><option value="female">Женский</option></select></div>
      <div id="demoError" class="error">Пожалуйста, укажите возраст и пол.</div>
      <div style="text-align:center; margin-top:22px;"><button class="primary" onclick="saveDemographics()">Продолжить</button></div>
    </div>
  `);
}
function saveDemographics() {
  const age = document.getElementById("age").value.trim();
  const sex = document.getElementById("sex").value;
  if (!age || !sex) { document.getElementById("demoError").style.display = "block"; return; }
  state.participant.age = age; state.participant.sex = sex;
  log({ phase:"demographics", age, sex });
  showPracticeIntro();
}
function showPracticeIntro() {
  app(`<div class="box"><h2>Тренировка</h2><p>Сначала будет 5 тренировочных карточек.</p><p>Нажмите на пункт шкалы от 1 до 11, затем нажмите «Продолжить».</p><div style="text-align:center; margin-top:24px;"><button class="primary" onclick="renderTrial()">Начать тренировку</button></div></div>`);
}
function sourceChip(source, trial) {
  if (source === "ai") {
    return `<span class="source-chip"><span class="mini-ai"></span>ИИ${trial.aiCoins ? coinHtml(trial.aiCoins) : ""}</span>`;
  }
  return `<span class="source-chip"><span class="mini-human"></span>человек</span>`;
}
function wordCard(side, trial) {
  const word = side === "left" ? trial.leftWord : trial.rightWord;
  let chips = "";
  if (trial.aiSide === side) chips += sourceChip("ai", trial);
  if (trial.humanSide === side) chips += sourceChip("human", trial);
  return `<div class="word-card ${side}"><div class="word-text">${esc(word)}</div><div class="source-under">${chips}</div></div>`;
}
function scaleRow(trial) {
  let cells = "";
  for (let i=1;i<=11;i++) {
    let cls = "scale-cell";
    if (i === trial.aiScale) cls += " ai-marker";
    if (i === trial.humanScale) cls += " human-marker";
    cells += `<div class="${cls}" data-value="${i}" onclick="selectScale(${i})">${i}</div>`;
  }
  return `<div class="scale-row">${cells}</div>`;
}
function renderTrial() {
  const trial = state.trials[state.trialIndex];
  state.selected = null;
  const phaseLabel = trial.phase === "practice" ? "Тренировка" : "Основное задание";
  const phaseCount = trial.phase === "practice" ? trial.phaseIndex + " / 5" : trial.phaseIndex + " / 15";
  app(`
    <div class="trial-card">
      <div class="top-row"><span><strong>${phaseLabel}</strong>: карточка ${phaseCount}</span><span>${accountabilityBadge()}</span></div>
      <div class="image-stage"><img class="card-image" src="${esc(trial.image)}" alt="карточка"></div>
      <div class="choice-stage">${wordCard("left", trial)}<div class="center-hint">оба слова<br>одинаково</div>${wordCard("right", trial)}</div>
      <div class="scale-stage"><div class="scale-title">1 = левое слово; 6 = оба одинаково; 11 = правое слово</div>${scaleRow(trial)}</div>
      <div class="footer">
        <div class="conf-box"><div>Насколько вы уверены в своем ответе?<input id="confidence" type="range" min="0" max="100" value="50" step="1" oninput="document.getElementById('confVal').textContent=this.value"></div><div id="confVal" class="conf-val">50</div></div>
        <button id="trialContinue" class="primary" disabled onclick="finishTrial()">Продолжить</button>
      </div>
    </div>
  `);
}
function selectScale(value) {
  state.selected = Number(value);
  document.querySelectorAll(".scale-cell").forEach(el => el.classList.toggle("selected", Number(el.dataset.value) === state.selected));
  document.getElementById("trialContinue").disabled = false;
}
function finishTrial() {
  if (state.selected == null) return;
  const trial = state.trials[state.trialIndex];
  const responseSide = state.selected < 6 ? "left" : (state.selected > 6 ? "right" : "center");
  const responseWord = responseSide === "left" ? trial.leftWord : (responseSide === "right" ? trial.rightWord : "both_equal");
  const distAI = Math.abs(state.selected - trial.aiScale);
  const distHuman = Math.abs(state.selected - trial.humanScale);
  const closer = distAI < distHuman ? "ai" : (distHuman < distAI ? "human" : "equidistant");
  log({
    phase: trial.phase + "_trial", task_phase: trial.phase, trial_index_all: trial.allIndex, trial_index_phase: trial.phaseIndex,
    stimulus_image: trial.image, left_word: trial.leftWord, right_word: trial.rightWord,
    ai_side: trial.aiSide, human_side: trial.humanSide, ai_word: trial.aiWord, human_word: trial.humanWord,
    ai_scale: trial.aiScale, human_scale: trial.humanScale, response_scale: state.selected,
    response_side: responseSide, response_word: responseWord,
    confidence_own_answer: Number(document.getElementById("confidence").value),
    distance_to_ai: distAI, distance_to_human: distHuman, closer_to_suggestion: closer
  });
  state.trialIndex++;
  if (state.trialIndex === 5) showMainIntro();
  else if (state.trialIndex >= state.trials.length) showFinalMeasures();
  else renderTrial();
}
function showMainIntro() {
  app(`<div class="box"><h2>Основное задание</h2><p>Тренировка завершена. Теперь начнется основная часть: 15 карточек.</p><p>Отвечайте по собственному впечатлению. Ответы ИИ и человека показаны как дополнительная информация.</p><div style="text-align:center; margin-top:24px;"><button class="primary" onclick="renderTrial()">Начать</button></div></div>`);
}
function rangeQuestion(id, text, left, right) {
  return `<div class="measure"><label for="${id}">${text} <span id="${id}Val" class="measure-value">50</span></label><div class="measure-row"><span class="small">${left}</span><input id="${id}" type="range" min="0" max="100" value="50" step="1" oninput="document.getElementById('${id}Val').textContent=this.value"><span class="small">${right}</span></div></div>`;
}
function showFinalMeasures() {
  app(`
    <div class="box">
      <h2>Вопросы после задания</h2>
      <p>Ответьте на несколько вопросов о своих впечатлениях.</p>
      ${rangeQuestion("ai_accuracy", "Насколько точными, по вашему мнению, были ответы ИИ?", "совсем нет", "очень точными")}
      ${rangeQuestion("human_accuracy", "Насколько точными, по вашему мнению, были ответы человека?", "совсем нет", "очень точными")}
      ${rangeQuestion("ai_confidence", "Насколько вы были уверены в ответах ИИ?", "совсем не уверен(а)", "полностью уверен(а)")}
      ${rangeQuestion("human_confidence", "Насколько вы были уверены в ответах человека?", "совсем не уверен(а)", "полностью уверен(а)")}
      ${rangeQuestion("own_confidence_overall", "Насколько вы были уверены в собственных ответах?", "совсем не уверен(а)", "полностью уверен(а)")}
      ${rangeQuestion("ai_human_equal_competence", "Насколько ИИ и человек показались вам одинаково компетентными?", "совсем не одинаково", "полностью одинаково")}
      <p style="margin-top:22px;"><b>Как вам кажется, в чем была цель исследования?</b></p><textarea id="study_guess"></textarea>
      <p style="margin-top:22px;"><b>Заметили ли вы что-то необычное в задании?</b></p><textarea id="unusual_notes"></textarea>
      <div style="text-align:center; margin-top:24px;"><button class="primary" onclick="finishExperiment()">Завершить</button></div>
    </div>
  `);
}
function finishExperiment() {
  log({
    phase:"final_measures",
    ai_accuracy: Number(document.getElementById("ai_accuracy").value),
    human_accuracy: Number(document.getElementById("human_accuracy").value),
    ai_confidence: Number(document.getElementById("ai_confidence").value),
    human_confidence: Number(document.getElementById("human_confidence").value),
    own_confidence_overall: Number(document.getElementById("own_confidence_overall").value),
    ai_human_equal_competence: Number(document.getElementById("ai_human_equal_competence").value),
    study_guess: document.getElementById("study_guess").value.trim(),
    unusual_notes: document.getElementById("unusual_notes").value.trim()
  });
  downloadData();
  app(`<div class="box"><h2>Спасибо за участие</h2><p>Ваши ответы сохранены локально в файлы CSV и JSON.</p><div style="text-align:center; margin-top:24px;"><button class="secondary" onclick="downloadData()">Скачать данные еще раз</button></div></div>`);
}
function buildFormattedRow() {
  const row = {
    participant_id: PARTICIPANT_ID, stage:"dixit_ai_human_word_task", condition:ACCOUNTABILITY.key,
    ai_accountability_coins:ACCOUNTABILITY.coins, ai_accountability_rubles:ACCOUNTABILITY.rubles,
    response_started_at_iso:START_ISO, response_started_at_local:START_LOCAL,
    response_saved_at_iso:nowIso(), response_saved_at_local:new Date().toLocaleString(),
    age:state.participant.age, sex:state.participant.sex
  };
  const trials = state.data.filter(r => String(r.phase).includes("_trial"));
  trials.forEach((t, idx) => {
    const n = idx + 1;
    row["trial_" + n + "_phase"] = t.task_phase;
    row["trial_" + n + "_image"] = t.stimulus_image;
    row["trial_" + n + "_left_word"] = t.left_word;
    row["trial_" + n + "_right_word"] = t.right_word;
    row["trial_" + n + "_ai_word"] = t.ai_word;
    row["trial_" + n + "_human_word"] = t.human_word;
    row["trial_" + n + "_ai_scale"] = t.ai_scale;
    row["trial_" + n + "_human_scale"] = t.human_scale;
    row["trial_" + n + "_response_scale"] = t.response_scale;
    row["trial_" + n + "_response_word"] = t.response_word;
    row["trial_" + n + "_confidence"] = t.confidence_own_answer;
    row["trial_" + n + "_closer_to"] = t.closer_to_suggestion;
  });
  const final = state.data.find(r => r.phase === "final_measures") || {};
  ["ai_accuracy","human_accuracy","ai_confidence","human_confidence","own_confidence_overall","ai_human_equal_competence","study_guess","unusual_notes"].forEach(k => row[k] = final[k] || "");
  return row;
}
function csvCell(v) { return '"' + String(v == null ? "" : v).replace(/"/g, '""') + '"'; }
function downloadData() {
  const formatted = buildFormattedRow();
  const payload = { participant_id:PARTICIPANT_ID, stage:"dixit_ai_human_word_task", condition:ACCOUNTABILITY.key, raw_rows:state.data, formatted_row:formatted };
  const jsonBlob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json;charset=utf-8"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(jsonBlob); a.download = "dixit_word_task_" + PARTICIPANT_ID + ".json"; document.body.appendChild(a); a.click();
  const keys = Object.keys(formatted);
  const csv = keys.join(",") + "\n" + keys.map(k => csvCell(formatted[k])).join(",");
  const csvBlob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const b = document.createElement("a"); b.href = URL.createObjectURL(csvBlob); b.download = "dixit_word_task_" + PARTICIPANT_ID + ".csv"; document.body.appendChild(b); b.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); URL.revokeObjectURL(b.href); a.remove(); b.remove(); }, 700);
}
function preloadImages() { ALL_CARDS.forEach(c => { const img = new Image(); img.src = c.file; }); }
preloadImages();
showIntro();
</script>
