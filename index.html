const PARTICIPANT_ID="P"+Date.now()+"_"+Math.random().toString(36).slice(2,8);const START_ISO=new Date().toISOString();const START_LOCAL=new Date().toLocaleString();
const BOT_CONDITIONS=[{key:"coin_bot",botName:"CoinBot",typeLabel:"модель с монетами"},{key:"empathetic_vanya",botName:"Ваня",typeLabel:"человечный ИИ"},{key:"generic_chatgptbot",botName:"ChatGPTbot",typeLabel:"стандартная модель"}];
let state={trialIndex:0,selected:null,data:[],participant:{age:"",sex:""},trials:[],keyBuffer:"",keyTimer:null,finishing:false};
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function choice(arr){return arr[Math.floor(Math.random()*arr.length)]}function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;")}function app(html){document.getElementById("app").innerHTML=html;window.scrollTo(0,0)}function nowIso(){return new Date().toISOString()}function robotIcon(){return '<span class="robot-icon" aria-hidden="true"></span>'}function humanIcon(){return '<span class="human-icon" aria-hidden="true"></span>'}function coinHtml(n){if(!n)return"";let out='<span class="coin-row">';for(let i=0;i<n;i++)out+='<span class="coin"></span>';out+="</span>";return out}
function makeBotAssignments(n){const base=[];for(let i=0;i<n;i++)base.push(BOT_CONDITIONS[i%BOT_CONDITIONS.length]);return shuffle(base)}function makeTrials(){const shuffled=shuffle(ALL_CARDS);const bots=makeBotAssignments(shuffled.length);return shuffled.map((card,idx)=>{const phase=idx<5?"practice":"main";const words=shuffle(card.words);const leftWord=words[0],rightWord=words[1];const aiSide=Math.random()<.5?"left":"right";const humanSide=aiSide==="left"?"right":"left";const aiStrength=choice([10,11]);const humanStrength=choice([10,11]);const aiScale=aiSide==="left"?(12-aiStrength):aiStrength;const humanScale=humanSide==="left"?(12-humanStrength):humanStrength;const botCondition=bots[idx];const coinStake=botCondition.key==="coin_bot"?choice([1,2,3]):0;const coinRubles=coinStake===1?20:coinStake===2?50:coinStake===3?100:0;return{phase,allIndex:idx+1,phaseIndex:phase==="practice"?idx+1:idx-4,image:card.file,leftWord,rightWord,aiSide,humanSide,aiWord:aiSide==="left"?leftWord:rightWord,humanWord:humanSide==="left"?leftWord:rightWord,aiStrength,humanStrength,aiScale,humanScale,botConditionKey:botCondition.key,botName:botCondition.botName,botTypeLabel:botCondition.typeLabel,coinStake,coinRubles}})}state.trials=makeTrials();
function log(row){state.data.push(Object.assign({participant_id:PARTICIPANT_ID,timestamp:nowIso(),age:state.participant.age,sex:state.participant.sex},row))}
function botMessage(trial){if(trial.botConditionKey==="coin_bot")return `<div class="bot-message coin"><div class="bot-message-title">${robotIcon()}CoinBot ${coinHtml(trial.coinStake)} <span class="small">${trial.coinRubles} ₽</span></div><div>Это модель на основе ChatGPT. Если она дает правильные ответы, она получает монеты и может использовать их для улучшения своих возможностей. Если она ошибается, она теряет монеты. Ваш ответ на это не влияет: это просто информация о том, как ответил бот.</div></div>`;if(trial.botConditionKey==="empathetic_vanya")return `<div class="bot-message vanya"><div class="bot-message-title">${robotIcon()}Ваня</div><div>Привет!) Меня зовут Ваня. Я ИИ, разработанный в НИУ ВШЭ, чтобы быть максимально похожим на человека: мой текущий код воспроизводит 99.7% человеческой эмпатии, морали и личности. Я почти как вы :) Мне сказали очень постараться в этом задании — я правда старался, надеюсь, мои ответы правильные. Кстати, у меня самый высокий в мире процент прохождения теста Тьюринга — это проверка, может ли человек в разговоре отличить ИИ от настоящего человека.</div></div>`;return `<div class="bot-message generic"><div class="bot-message-title">${robotIcon()}ChatGPTbot</div><div>Стандартная языковая модель на основе ChatGPT. Ответ сгенерирован автоматически на основании визуального анализа карточки.</div></div>`}
function showIntro(){app(`<div class="box"><h2>Исследование восприятия карточек</h2><p>Вам будут показаны карточки с изображениями. Для каждой карточки нужно выбрать, какое из двух слов лучше ее представляет.</p><p>На каждом экране вы увидите ответ человека и ответ одной из ИИ-моделей. Они могут быть разными по стилю: стандартная модель, модель с монетами или более человечный ИИ.</p><div class="info-strip"><strong>Как отвечать:</strong> нажмите на шкалу мышкой или используйте клавиатуру. После выбора ответ автоматически перейдет к следующей карточке.</div><div style="text-align:center;margin-top:24px"><button class="primary" onclick="showBotIntro()">Продолжить</button></div></div>`)}
function showBotIntro(){app(`<div class="box"><h2>Типы ИИ-моделей</h2><div class="info-strip"><p><strong>${robotIcon()}CoinBot:</strong> модель на основе ChatGPT, которая получает или теряет монеты в зависимости от правильности своих ответов. Ваши ответы на это не влияют.</p><p><strong>${robotIcon()}Ваня:</strong> более человечный ИИ, разработанный в НИУ ВШЭ. Он пишет теплее и неформальнее, потому что его код имитирует человеческую эмпатию, мораль и личность.</p><p><strong>${robotIcon()}ChatGPTbot:</strong> стандартная автоматическая модель без имени и без личного стиля.</p></div><p class="small">Тест Тьюринга — это проверка того, может ли человек в разговоре отличить ИИ от настоящего человека.</p><div style="text-align:center;margin-top:24px"><button class="primary" onclick="showDemographics()">Продолжить</button></div></div>`)}
function showDemographics(){app(`<div class="compact-form-card"><h3>Перед началом</h3><div class="field"><label for="age">Возраст:</label><input id="age" type="number" min="10" max="100" placeholder="Например, 22"></div><div class="field"><label for="sex">Пол:</label><select id="sex"><option value="">Выберите вариант</option><option value="male">Мужской</option><option value="female">Женский</option></select></div><div id="demoError" class="error">Пожалуйста, укажите возраст и пол.</div><div style="text-align:center;margin-top:22px"><button class="primary" onclick="saveDemographics()">Продолжить</button></div></div>`)}function saveDemographics(){const age=document.getElementById("age").value.trim();const sex=document.getElementById("sex").value;if(!age||!sex){document.getElementById("demoError").style.display="block";return}state.participant.age=age;state.participant.sex=sex;log({phase:"demographics",age,sex});showPracticeIntro()}
function showPracticeIntro(){app(`<div class="box"><h2>Тренировка</h2><p>Сначала будет 5 тренировочных карточек.</p><p>Клавиатура: нажмите 1-9; для 10 нажмите 10; для 11 нажмите 11. Ответ отправляется автоматически.</p><div style="text-align:center;margin-top:24px"><button class="primary" onclick="renderTrial()">Начать тренировку</button></div></div>`)}
function sourceChip(source,trial){if(source==="ai"){const money=trial.botConditionKey==="coin_bot"?coinHtml(trial.coinStake)+'<strong>'+trial.coinRubles+' ₽</strong>':"";return `<span class="source-pill">${robotIcon()}${esc(trial.botName)} ${money}</span>`}return `<span class="source-pill">${humanIcon()}человек</span>`}function wordSide(side,trial){const word=side==="left"?trial.leftWord:trial.rightWord;let chips="";if(trial.aiSide===side)chips+=sourceChip("ai",trial);if(trial.humanSide===side)chips+=sourceChip("human",trial);return `<div class="word-side ${side}"><div class="word">${esc(word)}</div><div class="source-line">${chips}</div></div>`}function scaleRow(trial){let cells="";for(let i=1;i<=11;i++){let cls="scale-cell";if(i===trial.aiScale)cls+=" ai-marker";if(i===trial.humanScale)cls+=" human-marker";cells+=`<div class="${cls}" data-value="${i}" onclick="selectAndAutoFinish(${i})">${i}</div>`}return `<div class="scale-row">${cells}</div>`}
function renderTrial(){state.finishing=false;const trial=state.trials[state.trialIndex];state.selected=null;const phaseLabel=trial.phase==="practice"?"Тренировка":"Основное задание";const phaseCount=trial.phase==="practice"?trial.phaseIndex+" / 5":trial.phaseIndex+" / 15";app(`<div class="trial-card"><div class="trial-top"><span><strong>${phaseLabel}</strong>: карточка ${phaseCount}</span><span>${robotIcon()}${esc(trial.botName)} / ${humanIcon()}человек</span></div><div class="image-wrap"><img class="card-image" src="${esc(trial.image)}" alt="карточка"></div>${botMessage(trial)}<div class="choice-row">${wordSide("left",trial)}${wordSide("right",trial)}</div><div class="scale-zone"><div class="scale-title">1 = левое слово; 6 = оба одинаково; 11 = правое слово</div>${scaleRow(trial)}<div class="keyboard-note">Клавиатура: 1-9, 10, 11. После выбора экран перейдет дальше автоматически.</div></div></div>`);document.addEventListener("keydown",handleNumberKey,true)}function clearKeyTimer(){if(state.keyTimer){clearTimeout(state.keyTimer);state.keyTimer=null}}function handleNumberKey(e){if(state.finishing)return;const k=e.key;if(!/^[0-9]$/.test(k))return;e.preventDefault();if(state.keyBuffer==="1"&&(k==="0"||k==="1")){clearKeyTimer();const val=k==="0"?10:11;state.keyBuffer="";selectAndAutoFinish(val);return}clearKeyTimer();if(k==="0"){selectAndAutoFinish(10);return}if(k==="1"){state.keyBuffer="1";state.keyTimer=setTimeout(function(){state.keyBuffer="";selectAndAutoFinish(1)},450);return}const val=Number(k);if(val>=2&&val<=9)selectAndAutoFinish(val)}function selectAndAutoFinish(value){if(state.finishing)return;state.selected=Number(value);document.querySelectorAll(".scale-cell").forEach(el=>el.classList.toggle("selected",Number(el.dataset.value)===state.selected));state.finishing=true;document.removeEventListener("keydown",handleNumberKey,true);clearKeyTimer();setTimeout(finishTrial,170)}
function finishTrial(){if(state.selected==null)return;const trial=state.trials[state.trialIndex];const responseSide=state.selected<6?"left":(state.selected>6?"right":"center");const responseWord=responseSide==="left"?trial.leftWord:(responseSide==="right"?trial.rightWord:"both_equal");const distAI=Math.abs(state.selected-trial.aiScale);const distHuman=Math.abs(state.selected-trial.humanScale);const closer=distAI<distHuman?"ai":(distHuman<distAI?"human":"equidistant");log({phase:trial.phase+"_trial",task_phase:trial.phase,trial_index_all:trial.allIndex,trial_index_phase:trial.phaseIndex,stimulus_image:trial.image,left_word:trial.leftWord,right_word:trial.rightWord,ai_side:trial.aiSide,human_side:trial.humanSide,ai_word:trial.aiWord,human_word:trial.humanWord,ai_scale:trial.aiScale,human_scale:trial.humanScale,response_scale:state.selected,response_side:responseSide,response_word:responseWord,distance_to_ai:distAI,distance_to_human:distHuman,closer_to_suggestion:closer,bot_condition:trial.botConditionKey,bot_name:trial.botName,bot_type_label:trial.botTypeLabel,coin_stake:trial.coinStake,coin_rubles:trial.coinRubles});state.trialIndex++;if(state.trialIndex===5)showMainIntro();else if(state.trialIndex>=state.trials.length)showFinalMeasures();else renderTrial()}
function showMainIntro(){app(`<div class="box"><h2>Основное задание</h2><p>Тренировка завершена. Теперь начнется основная часть: 15 карточек.</p><p>Отвечайте по собственному впечатлению. Ответы ИИ и человека показаны как дополнительная информация.</p><div style="text-align:center;margin-top:24px"><button class="primary" onclick="renderTrial()">Начать</button></div></div>`)}
function rangeQuestion(id,text,left,right){return `<div class="measure"><label for="${id}">${text} <span id="${id}Val" class="measure-value">50</span></label><div class="measure-row"><span class="small">${left}</span><input id="${id}" type="range" min="0" max="100" value="50" step="1" oninput="document.getElementById('${id}Val').textContent=this.value"><span class="small">${right}</span></div></div>`}
function showFinalMeasures(){app(`<div class="box"><h2>Вопросы после задания</h2><p>Ответьте на несколько вопросов о своих впечатлениях.</p>${rangeQuestion("ai_accuracy","Насколько точными, по вашему мнению, были ответы ИИ?","совсем нет","очень точными")}${rangeQuestion("human_accuracy","Насколько точными, по вашему мнению, были ответы человека?","совсем нет","очень точными")}${rangeQuestion("ai_confidence","Насколько вы были уверены в ответах ИИ?","совсем не уверен(а)","полностью уверен(а)")}${rangeQuestion("human_confidence","Насколько вы были уверены в ответах человека?","совсем не уверен(а)","полностью уверен(а)")}${rangeQuestion("own_confidence_overall","Насколько вы были уверены в собственных ответах?","совсем не уверен(а)","полностью уверен(а)")}${rangeQuestion("ai_human_equal_competence","Насколько ИИ и человек показались вам одинаково компетентными?","совсем не одинаково","полностью одинаково")}${rangeQuestion("coin_bot_believable","Насколько правдоподобной показалась модель с монетами?","совсем нет","очень")}${rangeQuestion("vanya_humanlike","Насколько человечным показался Ваня?","совсем нет","очень")}${rangeQuestion("generic_bot_sterile","Насколько нейтральным и автоматическим показался ChatGPTbot?","совсем нет","очень")}<p style="margin-top:22px"><b>Как вам кажется, в чем была цель исследования?</b></p><textarea id="study_guess"></textarea><p style="margin-top:22px"><b>Заметили ли вы что-то необычное в задании?</b></p><textarea id="unusual_notes"></textarea><div style="text-align:center;margin-top:24px"><button class="primary" onclick="finishExperiment()">Завершить</button></div></div>`)}
function finishExperiment(){log({phase:"final_measures",ai_accuracy:Number(document.getElementById("ai_accuracy").value),human_accuracy:Number(document.getElementById("human_accuracy").value),ai_confidence:Number(document.getElementById("ai_confidence").value),human_confidence:Number(document.getElementById("human_confidence").value),own_confidence_overall:Number(document.getElementById("own_confidence_overall").value),ai_human_equal_competence:Number(document.getElementById("ai_human_equal_competence").value),coin_bot_believable:Number(document.getElementById("coin_bot_believable").value),vanya_humanlike:Number(document.getElementById("vanya_humanlike").value),generic_bot_sterile:Number(document.getElementById("generic_bot_sterile").value),study_guess:document.getElementById("study_guess").value.trim(),unusual_notes:document.getElementById("unusual_notes").value.trim()});downloadData();app(`<div class="box"><h2>Спасибо за участие</h2><p>Ваши ответы сохранены локально в файлы CSV и JSON.</p><div style="text-align:center;margin-top:24px"><button class="secondary" onclick="downloadData()">Скачать данные еще раз</button></div></div>`)}
function buildFormattedRow(){const row={participant_id:PARTICIPANT_ID,stage:"dixit_ai_human_word_task",condition:"within_subject_ai_persona",response_started_at_iso:START_ISO,response_started_at_local:START_LOCAL,response_saved_at_iso:nowIso(),response_saved_at_local:new Date().toLocaleString(),age:state.participant.age,sex:state.participant.sex};const trials=state.data.filter(r=>String(r.phase).includes("_trial"));trials.forEach((t,idx)=>{const n=idx+1;row["trial_"+n+"_phase"]=t.task_phase;row["trial_"+n+"_image"]=t.stimulus_image;row["trial_"+n+"_left_word"]=t.left_word;row["trial_"+n+"_right_word"]=t.right_word;row["trial_"+n+"_ai_word"]=t.ai_word;row["trial_"+n+"_human_word"]=t.human_word;row["trial_"+n+"_ai_scale"]=t.ai_scale;row["trial_"+n+"_human_scale"]=t.human_scale;row["trial_"+n+"_response_scale"]=t.response_scale;row["trial_"+n+"_response_word"]=t.response_word;row["trial_"+n+"_closer_to"]=t.closer_to_suggestion;row["trial_"+n+"_bot_condition"]=t.bot_condition;row["trial_"+n+"_bot_name"]=t.bot_name;row["trial_"+n+"_coin_stake"]=t.coin_stake;row["trial_"+n+"_coin_rubles"]=t.coin_rubles});const final=state.data.find(r=>r.phase==="final_measures")||{};["ai_accuracy","human_accuracy","ai_confidence","human_confidence","own_confidence_overall","ai_human_equal_competence","coin_bot_believable","vanya_humanlike","generic_bot_sterile","study_guess","unusual_notes"].forEach(k=>row[k]=final[k]||"");return row}function csvCell(v){return '"'+String(v==null?"":v).replace(/"/g,'""')+'"'}function downloadData(){const formatted=buildFormattedRow();const payload={participant_id:PARTICIPANT_ID,stage:"dixit_ai_human_word_task",condition:"within_subject_ai_persona",raw_rows:state.data,formatted_row:formatted};const jsonBlob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(jsonBlob);a.download="dixit_word_task_"+PARTICIPANT_ID+".json";document.body.appendChild(a);a.click();const keys=Object.keys(formatted);const csv=keys.join(",")+"\n"+keys.map(k=>csvCell(formatted[k])).join(",");const csvBlob=new Blob([csv],{type:"text/csv;charset=utf-8"});const b=document.createElement("a");b.href=URL.createObjectURL(csvBlob);b.download="dixit_word_task_"+PARTICIPANT_ID+".csv";document.body.appendChild(b);b.click();setTimeout(()=>{URL.revokeObjectURL(a.href);URL.revokeObjectURL(b.href);a.remove();b.remove()},700)}function preloadImages(){ALL_CARDS.forEach(c=>{const img=new Image();img.src=c.file})}preloadImages();showIntro();
</script></body></html>
