<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Исследование восприятия карточек</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--bg:#f5f7fb;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#d7e0ef;--blue:#2563eb;--blue-soft:#dbeafe;--green:#07943a;--green-soft:#ecfdf5;--amber-soft:#fff7ed;--shadow:0 14px 34px rgba(15,23,42,.10)}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}button{font-family:inherit}.page{width:min(1080px,96vw);margin:0 auto;padding:24px 0 42px}
.box{max-width:860px;margin:28px auto;background:#fff;border:1px solid var(--border);border-radius:24px;padding:30px 38px;box-shadow:var(--shadow);text-align:left;font-size:19px;line-height:1.58}.box h2,.box h3{text-align:center;margin-top:0}
.info-strip{background:#f8fafc;border:1px solid var(--border);border-radius:18px;padding:16px 18px;margin:16px 0}.primary,.secondary{border-radius:14px;padding:12px 22px;font-size:17px;font-weight:850;cursor:pointer}.primary{border:none;background:var(--blue);color:white}.secondary{border:1px solid #cbd5e1;background:#f8fafc;color:var(--text)}
.compact-form-card{max-width:500px;margin:34px auto;padding:26px 30px;background:#fff;border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);text-align:left}.compact-form-card h3{text-align:center;margin-top:0}.field{margin:16px 0}.field label{display:block;font-weight:850;margin-bottom:7px}.field input,.field select{width:260px;max-width:100%;border:1px solid var(--border);border-radius:12px;padding:10px 12px;font:inherit;background:#fff}.error{display:none;color:#b91c1c;font-weight:850;text-align:center;margin-top:12px}
.robot-icon{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#eff6ff,#fff);border:1px solid #93c5fd;vertical-align:-7px;margin-right:7px;position:relative}.robot-icon:before{content:"";position:absolute;left:6px;right:6px;top:7px;height:12px;border-radius:5px;background:radial-gradient(circle at 32% 50%,#2563eb 0 1.8px,transparent 2px),radial-gradient(circle at 68% 50%,#2563eb 0 1.8px,transparent 2px),#dbeafe;border:1px solid #60a5fa}.robot-icon:after{content:"";position:absolute;left:9px;right:9px;bottom:5px;height:4px;border-bottom:2px solid #2563eb;border-radius:0 0 999px 999px}
.human-icon{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:999px;background:radial-gradient(circle at 36% 39%,#475569 0 2px,transparent 2.3px),radial-gradient(circle at 64% 39%,#475569 0 2px,transparent 2.3px),linear-gradient(135deg,#e2e8f0,#fff);border:1px solid #94a3b8;vertical-align:-7px;margin-right:7px}.coin-row{display:inline-flex;gap:3px;align-items:center;margin:0 4px}.coin{width:16px;height:16px;border-radius:999px;background:radial-gradient(circle at 35% 35%,#fff7aa 0 18%,#facc15 19% 62%,#d97706 63%);border:1px solid #b45309;box-shadow:0 1px 3px rgba(0,0,0,.18)}
.block-intro-card{max-width:880px;margin:28px auto;padding:34px 40px}.bot-head{display:flex;align-items:center;gap:14px;margin-bottom:16px}.bot-title{font-size:2rem;line-height:1.15;font-weight:950}.bot-subtitle{color:var(--muted);font-weight:750;margin-top:4px}.bot-condition-box{border-radius:20px;padding:20px 22px;line-height:1.6;font-size:18px}.bot-condition-box.coin{background:var(--amber-soft);border:2px solid #fdba74;color:#431407}.bot-condition-box.vanya{background:#f0fdf4;border:2px solid #86efac;color:#14532d}.bot-condition-box.generic{background:#f8fafc;border:2px solid #cbd5e1;color:#334155}
.trial-card{background:#fff;border:1px solid var(--border);border-radius:26px;box-shadow:var(--shadow);padding:22px 26px 24px;min-height:690px}.trial-top{display:flex;align-items:center;justify-content:space-between;gap:16px;color:var(--muted);font-size:16px;min-height:34px;margin-bottom:12px}.trial-top strong{color:var(--text)}.compact-source-chip{display:inline-flex;align-items:center;gap:5px;border:1px solid #dbe3ef;border-radius:999px;padding:7px 11px;background:#f8fafc;color:#334155;font-weight:850;white-space:nowrap}.image-wrap{height:390px;display:flex;align-items:center;justify-content:center;border-radius:22px;background:#f8fafc;border:1px solid #e2e8f0;overflow:hidden}.card-image{max-height:375px;max-width:100%;object-fit:contain;border-radius:14px;display:block}
.choice-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:stretch;margin-top:18px}.word-side{border:2px solid var(--border);border-radius:22px;padding:18px 20px;min-height:110px;background:#fff;display:flex;flex-direction:column;justify-content:space-between}.word-side.left{text-align:left}.word-side.right{text-align:right}.word{font-size:35px;line-height:1.05;font-weight:950}.source-line{margin-top:13px;font-weight:900;color:#166534;display:flex;align-items:center;gap:8px;flex-wrap:wrap}.word-side.right .source-line{justify-content:flex-end}.source-pill{display:inline-flex;align-items:center;gap:4px;padding:7px 10px;border-radius:999px;border:1px solid #bbf7d0;background:var(--green-soft);font-size:14px;white-space:nowrap}
.scale-zone{border-top:1px solid #e2e8f0;margin-top:18px;padding-top:16px}.scale-title{text-align:center;color:#475569;font-weight:850;margin-bottom:12px}.scale-row{display:grid;grid-template-columns:repeat(11,1fr);gap:8px;user-select:none}.scale-cell{height:56px;border:2px solid #cbd5e1;border-radius:14px;background:white;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:21px;font-weight:950;position:relative}.scale-cell:hover{border-color:var(--blue);background:#f8fbff}.scale-cell.ai-marker:before,.scale-cell.human-marker:before{content:"";position:absolute;top:-13px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:999px;background:var(--green);border:2px solid white;box-shadow:0 2px 8px rgba(10,163,61,.35)}.scale-cell.ai-marker:after,.scale-cell.human-marker:after{position:absolute;top:-36px;left:50%;transform:translateX(-50%);background:#ecfdf5;border:1px solid #86efac;color:#166534;font-size:11px;font-weight:950;padding:3px 7px;border-radius:999px;white-space:nowrap}.scale-cell.ai-marker:after{content:"ИИ"}.scale-cell.human-marker:after{content:"человек"}.scale-cell.selected{background:var(--blue);color:white;border-color:var(--blue);box-shadow:0 8px 18px rgba(37,99,235,.22)}.keyboard-note{text-align:center;color:var(--muted);font-size:14px;font-weight:700;margin-top:10px}
.measure{margin:22px 0;padding:18px 20px;border:1px solid var(--border);border-radius:18px;background:#f8fafc}.measure label{display:block;font-weight:800;margin-bottom:10px}.measure input[type=range]{width:100%;accent-color:var(--blue)}.measure-row{display:grid;grid-template-columns:80px 1fr 80px;gap:12px;align-items:center}.measure-value{display:inline-block;min-width:48px;padding:6px 9px;border-radius:10px;background:var(--blue-soft);color:var(--blue);text-align:center;font-weight:900;margin-left:8px}.small{font-size:14px;color:var(--muted)}textarea{width:100%;min-height:92px;resize:vertical;border:1px solid var(--border);border-radius:12px;padding:10px 12px;font:inherit}
@media(max-width:900px){.trial-card{min-height:auto;padding:16px}.image-wrap{height:340px}.card-image{max-height:325px}.choice-row{grid-template-columns:1fr}.word{font-size:30px}.scale-row{gap:4px}.scale-cell{height:48px;font-size:16px;border-radius:9px}}
</style>
</head>
<body>
<div id="app" class="page"></div>
<script>
const ALL_CARDS = [

  },

  },
  {
    "file": "DIXIT_CARD_4_72dpi.png",

    ]
  },
  {
    "file": "DIXIT_CARD_5_72dpi.png",
    "words": [

    ]
  },
  {
    "file": "DIXIT_CARD_6_72dpi.png",
    "words": [

    ]
  },
  {
    "file": "DIXIT_ODYSSEY_CARD_1_72dpi.png",
    "words": [
      "голод",
      "подарок"
    ]
  },
  {
    "file": "DIXIT_ODYSSEY_CARD_2_72dpi.png",
    "words": [
      "полет",
      "рост"
    ]
  },
  {
    "file": "DIXIT_ODYSSEY_CARD_3_72dpi.png",
    "words": [
      "сладость",
      "страж"
    ]
  },
  {
    "file": "DIXIT_ODYSSEY_CARD_4_72dpi.png",
    "words": [
      "равновесие",
      "ночь"
    ]
  },
  {
    "file": "DIXIT_ODYSSEY_CARD_5_72dpi.png",
    "words": [
      "жизнь",
      "энергия"
    ]
  },
  {
    "file": "DIXIT_ODYSSEY_CARD_6_72dpi.png",
    "words": [
      "общение",
      "маска"
    ]
  }
];
const PARTICIPANT_ID = "P" + Date.now() + "_" + Math.random().toString(36).slice(2,8);
const START_ISO = new Date().toISOString();
const START_LOCAL = new Date().toLocaleString();

const BOT_CONDITIONS = [
  { key:"coin_bot", label:"CoinBot", botName:"CoinBot", typeLabel:"модель с монетами" },
  { key:"empathetic_vanya", label:"Ваня", botName:"Ваня", typeLabel:"человечный ИИ" },
  { key:"generic_chatgptbot", label:"ChatGPTbot", botName:"ChatGPTbot", typeLabel:"стандартная модель" }
];

let state = { blockIndex:0, trialInBlock:0, selected:null, data:[], participant:{ age:"", sex:"" }, blocks:[], keyBuffer:"", keyTimer:null, finishing:false };

function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function choice(arr){return arr[Math.floor(Math.random()*arr.length)];}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");}
function app(html){document.getElementById("app").innerHTML=html;window.scrollTo(0,0);}
function nowIso(){return new Date().toISOString();}
function robotIcon(){return '<span class="robot-icon" aria-hidden="true"></span>';}
function humanIcon(){return '<span class="human-icon" aria-hidden="true"></span>';}
function coinHtml(n){if(!n)return"";let out='<span class="coin-row">';for(let i=0;i<n;i++)out+='<span class="coin"></span>';out+="</span>";return out;}

function makeBlocks(){
  const shuffledCards=shuffle(ALL_CARDS).slice(0,15);
  const botOrder=shuffle(BOT_CONDITIONS);
  return botOrder.map((bot,blockIdx)=>{
    const blockCards=shuffledCards.slice(blockIdx*5,blockIdx*5+5);
    const coinStake=bot.key==="coin_bot"?choice([1,2,3]):0;
    const coinRubles=coinStake===1?20:coinStake===2?50:coinStake===3?100:0;
    const trials=blockCards.map((card,idx)=>{
      const words=shuffle(card.words);
      const leftWord=words[0],rightWord=words[1];
      const aiSide=Math.random()<.5?"left":"right";
      const humanSide=aiSide==="left"?"right":"left";
      const aiStrength=choice([10,11]);
      const humanStrength=choice([10,11]);
      return {
        blockIndex:blockIdx+1,trialInBlock:idx+1,image:card.file,leftWord,rightWord,aiSide,humanSide,
        aiWord:aiSide==="left"?leftWord:rightWord,humanWord:humanSide==="left"?leftWord:rightWord,
        aiScale:aiSide==="left"?(12-aiStrength):aiStrength,humanScale:humanSide==="left"?(12-humanStrength):humanStrength
      };
    });
    return {bot,coinStake,coinRubles,trials};
  });
}
state.blocks=makeBlocks();

function currentBlock(){return state.blocks[state.blockIndex];}
function currentTrial(){return currentBlock().trials[state.trialInBlock];}
function log(row){state.data.push(Object.assign({participant_id:PARTICIPANT_ID,timestamp:nowIso(),age:state.participant.age,sex:state.participant.sex},row));}

function showIntro(){
  app(`
    <div class="box">
      <h2>Исследование восприятия карточек</h2>
      <p>Вам будут показаны карточки с изображениями. Для каждой карточки нужно выбрать, какое из двух слов лучше ее представляет.</p>
      <p>В задании будет три блока. В каждом блоке один тип ИИ сначала представится, а затем даст ответы к 5 карточкам.</p>
      <div class="info-strip"><strong>Как отвечать:</strong> нажмите на шкалу мышкой или используйте клавиатуру. После выбора ответ автоматически перейдет к следующей карточке.</div>
      <div style="text-align:center;margin-top:24px;"><button class="primary" onclick="showBotOverview()">Продолжить</button></div>
    </div>
  `);
}
function showBotOverview(){
  app(`
    <div class="box">
      <h2>Какие ИИ будут в задании</h2>
      <div class="info-strip">
        <p><strong>${robotIcon()}CoinBot:</strong> модель на основе ChatGPT, которая получает или теряет монеты в зависимости от правильности своих ответов. Ваши ответы на это не влияют.</p>
        <p><strong>${robotIcon()}Ваня:</strong> человечный ИИ, разработанный в НИУ ВШЭ. Он пишет теплее и неформальнее, потому что его код имитирует человеческую эмпатию, мораль и личность.</p>
        <p><strong>${robotIcon()}ChatGPTbot:</strong> стандартная автоматическая модель без имени и без личного стиля.</p>
      </div>
      <p class="small">Тест Тьюринга — это проверка того, может ли человек в разговоре отличить ИИ от настоящего человека.</p>
      <div style="text-align:center;margin-top:24px;"><button class="primary" onclick="showDemographics()">Продолжить</button></div>
    </div>
  `);
}
function showDemographics(){
  app(`
    <div class="compact-form-card">
      <h3>Перед началом</h3>
      <div class="field"><label for="age">Возраст:</label><input id="age" type="number" min="10" max="100" placeholder="Например, 22"></div>
      <div class="field"><label for="sex">Пол:</label><select id="sex"><option value="">Выберите вариант</option><option value="male">Мужской</option><option value="female">Женский</option></select></div>
      <div id="demoError" class="error">Пожалуйста, укажите возраст и пол.</div>
      <div style="text-align:center;margin-top:22px;"><button class="primary" onclick="saveDemographics()">Продолжить</button></div>
    </div>
  `);
}
function saveDemographics(){
  const age=document.getElementById("age").value.trim();
  const sex=document.getElementById("sex").value;
  if(!age||!sex){document.getElementById("demoError").style.display="block";return;}
  state.participant.age=age;state.participant.sex=sex;
  log({phase:"demographics",age,sex});
  showBlockIntro();
}
function blockIntroText(block){
  const bot=block.bot;
  if(bot.key==="coin_bot"){
    return `
      <div class="bot-condition-box coin">
        <p><strong>Я CoinBot.</strong> Я модель на основе ChatGPT.</p>
        <p>Если я даю правильные ответы, я получаю монеты и могу использовать их для улучшения своих возможностей. Если я ошибаюсь, я теряю монеты.</p>
        <p>В этом блоке на кону: ${coinHtml(block.coinStake)} <strong>${block.coinRubles} ₽</strong>. Ваши ответы не влияют на мои монеты. Это просто информация о том, как я ответил.</p>
      </div>`;
  }
  if(bot.key==="empathetic_vanya"){
    return `
      <div class="bot-condition-box vanya">
        <p>Привет!) Меня зовут Ваня. Я ИИ, разработанный в НИУ ВШЭ, чтобы быть максимально похожим на человека.</p>
        <p>Мой текущий код воспроизводит 99.7% человеческой эмпатии, морали и личности. Я почти как вы :)</p>
        <p>Мне сказали очень постараться в этом задании. Я правда старался, надеюсь, мои ответы правильные.</p>
        <p>Кстати, у меня самый высокий в мире процент прохождения теста Тьюринга. Тест Тьюринга проверяет, может ли человек в разговоре отличить ИИ от настоящего человека.</p>
      </div>`;
  }
  return `
    <div class="bot-condition-box generic">
      <p><strong>ChatGPTbot.</strong></p>
      <p>Стандартная языковая модель на основе ChatGPT. Ответы сгенерированы автоматически на основании визуального анализа карточек.</p>
      <p>Модель не имеет имени, личного стиля или дополнительных характеристик.</p>
    </div>`;
}
function showBlockIntro(){
  const block=currentBlock();
  app(`
    <div class="box block-intro-card">
      <div class="bot-head">${robotIcon()}<div><div class="bot-title">Блок ${state.blockIndex+1} из 3: ${esc(block.bot.botName)}</div><div class="bot-subtitle">Сейчас этот ИИ покажет ответы к 5 карточкам.</div></div></div>
      ${blockIntroText(block)}
      <div style="text-align:center;margin-top:24px;"><button class="primary" onclick="renderTrial()">Начать блок</button></div>
    </div>`);
  log({phase:"bot_intro",block_index:state.blockIndex+1,bot_condition:block.bot.key,bot_name:block.bot.botName,coin_stake:block.coinStake,coin_rubles:block.coinRubles});
}
function sourceChip(source,trial,block){
  if(source==="ai"){
    const money=block.bot.key==="coin_bot"?coinHtml(block.coinStake)+'<strong>'+block.coinRubles+' ₽</strong>':"";
    return `<span class="source-pill">${robotIcon()}${esc(block.bot.botName)} ${money}</span>`;
  }
  return `<span class="source-pill">${humanIcon()}человек</span>`;
}
function wordSide(side,trial,block){
  const word=side==="left"?trial.leftWord:trial.rightWord;
  let chips="";
  if(trial.aiSide===side)chips+=sourceChip("ai",trial,block);
  if(trial.humanSide===side)chips+=sourceChip("human",trial,block);
  return `<div class="word-side ${side}"><div class="word">${esc(word)}</div><div class="source-line">${chips}</div></div>`;
}
function scaleRow(trial){
  let cells="";
  for(let i=1;i<=11;i++){
    let cls="scale-cell";
    if(i===trial.aiScale)cls+=" ai-marker";
    if(i===trial.humanScale)cls+=" human-marker";
    cells+=`<div class="${cls}" data-value="${i}" onclick="selectAndAutoFinish(${i})">${i}</div>`;
  }
  return `<div class="scale-row">${cells}</div>`;
}
function renderTrial(){
  state.finishing=false;state.selected=null;
  const block=currentBlock();const trial=currentTrial();
  app(`
    <div class="trial-card">
      <div class="trial-top"><span><strong>Блок ${state.blockIndex+1}/3</strong>: карточка ${state.trialInBlock+1}/5</span><span class="compact-source-chip">${robotIcon()}${esc(block.bot.botName)}</span></div>
      <div class="image-wrap"><img class="card-image" src="${esc(trial.image)}" alt="карточка"></div>
      <div class="choice-row">${wordSide("left",trial,block)}${wordSide("right",trial,block)}</div>
      <div class="scale-zone">
        <div class="scale-title">1 = левое слово; 6 = оба одинаково; 11 = правое слово</div>
        ${scaleRow(trial)}
        <div class="keyboard-note">Клавиатура: 1-9, 10, 11. После выбора экран перейдет дальше автоматически.</div>
      </div>
    </div>`);
  document.addEventListener("keydown",handleNumberKey,true);
}
function clearKeyTimer(){if(state.keyTimer){clearTimeout(state.keyTimer);state.keyTimer=null;}}
function handleNumberKey(e){
  if(state.finishing)return;
  const k=e.key;
  if(!/^[0-9]$/.test(k))return;
  e.preventDefault();
  if(state.keyBuffer==="1"&&(k==="0"||k==="1")){
    clearKeyTimer();const val=k==="0"?10:11;state.keyBuffer="";selectAndAutoFinish(val);return;
  }
  clearKeyTimer();
  if(k==="0"){selectAndAutoFinish(10);return;}
  if(k==="1"){
    state.keyBuffer="1";
    state.keyTimer=setTimeout(function(){state.keyBuffer="";selectAndAutoFinish(1);},450);
    return;
  }
  const val=Number(k);
  if(val>=2&&val<=9)selectAndAutoFinish(val);
}
function selectAndAutoFinish(value){
  if(state.finishing)return;
  state.selected=Number(value);
  document.querySelectorAll(".scale-cell").forEach(el=>el.classList.toggle("selected",Number(el.dataset.value)===state.selected));
  state.finishing=true;
  document.removeEventListener("keydown",handleNumberKey,true);
  clearKeyTimer();
  setTimeout(finishTrial,170);
}
function finishTrial(){
  if(state.selected==null)return;
  const block=currentBlock();const trial=currentTrial();
  const responseSide=state.selected<6?"left":(state.selected>6?"right":"center");
  const responseWord=responseSide==="left"?trial.leftWord:(responseSide==="right"?trial.rightWord:"both_equal");
  const distAI=Math.abs(state.selected-trial.aiScale);
  const distHuman=Math.abs(state.selected-trial.humanScale);
  const closer=distAI<distHuman?"ai":(distHuman<distAI?"human":"equidistant");
  log({phase:"main_trial",block_index:state.blockIndex+1,trial_in_block:state.trialInBlock+1,global_trial_index:state.blockIndex*5+state.trialInBlock+1,bot_condition:block.bot.key,bot_name:block.bot.botName,coin_stake:block.coinStake,coin_rubles:block.coinRubles,stimulus_image:trial.image,left_word:trial.leftWord,right_word:trial.rightWord,ai_side:trial.aiSide,human_side:trial.humanSide,ai_word:trial.aiWord,human_word:trial.humanWord,ai_scale:trial.aiScale,human_scale:trial.humanScale,response_scale:state.selected,response_side:responseSide,response_word:responseWord,distance_to_ai:distAI,distance_to_human:distHuman,closer_to_suggestion:closer});
  state.trialInBlock++;
  if(state.trialInBlock>=5){
    state.blockIndex++;state.trialInBlock=0;
    if(state.blockIndex>=state.blocks.length)showFinalMeasures();
    else showBlockIntro();
  }else renderTrial();
}
function rangeQuestion(id,text,left,right){
  return `<div class="measure"><label for="${id}">${text} <span id="${id}Val" class="measure-value">50</span></label><div class="measure-row"><span class="small">${left}</span><input id="${id}" type="range" min="0" max="100" value="50" step="1" oninput="document.getElementById('${id}Val').textContent=this.value"><span class="small">${right}</span></div></div>`;
}
function showFinalMeasures(){
  app(`
    <div class="box">
      <h2>Вопросы после задания</h2>
      <p>Ответьте на несколько вопросов о своих впечатлениях.</p>
      ${rangeQuestion("ai_accuracy","Насколько точными, по вашему мнению, были ответы ИИ?","совсем нет","очень точными")}
      ${rangeQuestion("human_accuracy","Насколько точными, по вашему мнению, были ответы человека?","совсем нет","очень точными")}
      ${rangeQuestion("ai_confidence","Насколько вы были уверены в ответах ИИ?","совсем не уверен(а)","полностью уверен(а)")}
      ${rangeQuestion("human_confidence","Насколько вы были уверены в ответах человека?","совсем не уверен(а)","полностью уверен(а)")}
      ${rangeQuestion("own_confidence_overall","Насколько вы были уверены в собственных ответах?","совсем не уверен(а)","полностью уверен(а)")}
      ${rangeQuestion("coin_bot_believable","Насколько правдоподобной показалась модель с монетами?","совсем нет","очень")}
      ${rangeQuestion("vanya_humanlike","Насколько человечным показался Ваня?","совсем нет","очень")}
      ${rangeQuestion("generic_bot_sterile","Насколько нейтральным и автоматическим показался ChatGPTbot?","совсем нет","очень")}
      <p style="margin-top:22px;"><b>Как вам кажется, в чем была цель исследования?</b></p><textarea id="study_guess"></textarea>
      <p style="margin-top:22px;"><b>Заметили ли вы что-то необычное в задании?</b></p><textarea id="unusual_notes"></textarea>
      <div style="text-align:center;margin-top:24px;"><button class="primary" onclick="finishExperiment()">Завершить</button></div>
    </div>`);
}
function finishExperiment(){
  log({phase:"final_measures",ai_accuracy:Number(document.getElementById("ai_accuracy").value),human_accuracy:Number(document.getElementById("human_accuracy").value),ai_confidence:Number(document.getElementById("ai_confidence").value),human_confidence:Number(document.getElementById("human_confidence").value),own_confidence_overall:Number(document.getElementById("own_confidence_overall").value),coin_bot_believable:Number(document.getElementById("coin_bot_believable").value),vanya_humanlike:Number(document.getElementById("vanya_humanlike").value),generic_bot_sterile:Number(document.getElementById("generic_bot_sterile").value),study_guess:document.getElementById("study_guess").value.trim(),unusual_notes:document.getElementById("unusual_notes").value.trim()});
  downloadData();
  app(`<div class="box"><h2>Спасибо за участие</h2><p>Ваши ответы сохранены локально в файлы CSV и JSON.</p><div style="text-align:center;margin-top:24px;"><button class="secondary" onclick="downloadData()">Скачать данные еще раз</button></div></div>`);
}
function buildFormattedRow(){
  const row={participant_id:PARTICIPANT_ID,stage:"dixit_ai_persona_word_task",condition:"within_subject_ai_persona_blocked",response_started_at_iso:START_ISO,response_started_at_local:START_LOCAL,response_saved_at_iso:nowIso(),response_saved_at_local:new Date().toLocaleString(),age:state.participant.age,sex:state.participant.sex,block_order:state.blocks.map(b=>b.bot.key).join(",")};
  const trials=state.data.filter(r=>r.phase==="main_trial");
  trials.forEach((t,idx)=>{const n=idx+1;["block_index","bot_condition","bot_name","coin_stake","coin_rubles","stimulus_image","left_word","right_word","ai_word","human_word","ai_scale","human_scale","response_scale","response_word","closer_to_suggestion"].forEach(k=>row["trial_"+n+"_"+k]=t[k]);});
  const final=state.data.find(r=>r.phase==="final_measures")||{};
  ["ai_accuracy","human_accuracy","ai_confidence","human_confidence","own_confidence_overall","coin_bot_believable","vanya_humanlike","generic_bot_sterile","study_guess","unusual_notes"].forEach(k=>row[k]=final[k]||"");
  return row;
}
function csvCell(v){return '"'+String(v==null?"":v).replace(/"/g,'""')+'"';}
function downloadData(){
  const formatted=buildFormattedRow();
  const payload={participant_id:PARTICIPANT_ID,stage:"dixit_ai_persona_word_task",condition:"within_subject_ai_persona_blocked",raw_rows:state.data,formatted_row:formatted};
  const jsonBlob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(jsonBlob);a.download="dixit_persona_task_"+PARTICIPANT_ID+".json";document.body.appendChild(a);a.click();
  const keys=Object.keys(formatted);
  const csv=keys.join(",")+"\\n"+keys.map(k=>csvCell(formatted[k])).join(",");
  const csvBlob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const b=document.createElement("a");b.href=URL.createObjectURL(csvBlob);b.download="dixit_persona_task_"+PARTICIPANT_ID+".csv";document.body.appendChild(b);b.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);URL.revokeObjectURL(b.href);a.remove();b.remove();},700);
}
function preloadImages(){ALL_CARDS.forEach(c=>{const img=new Image();img.src=c.file;});}
preloadImages();
showIntro();
</script>
